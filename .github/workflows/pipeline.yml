name: Data Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: pip install pandas

    - name: Ejecutar ETL
      run: python files/etl.py
